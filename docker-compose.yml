version: '3.8'

services:
  # Sentinel Remediator API
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - LOG_LEVEL=debug
      - LLM_PROVIDER=anthropic
      - LLM_MODEL=claude-3-5-sonnet-20241022
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - QDRANT_URL=qdrant:6334
      - WORK_DIR=/tmp/sentinel
      - MAX_ITERATIONS=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker builds
      - sentinel-work:/tmp/sentinel
    depends_on:
      - qdrant
    networks:
      - sentinel-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - sentinel-network

  # Dashboard (Next.js)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - sentinel
    networks:
      - sentinel-network

volumes:
  sentinel-work:
  qdrant-storage:

networks:
  sentinel-network:
    driver: bridge
